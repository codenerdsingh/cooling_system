function DiffBadge({ diff, col }) {

      background: col + "18", color: col, border: `1px solid ${col}40`,
      fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 20, whiteSpace: "nowrap"

  );
}

    const after = running + r.delta;
    running = after;
    return { ...r, after };
  });

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: T.sand, minHeight: "100vh", maxWidth: 480, margin: "0 auto" }}>

      {/* ── HEADER ─────────────────────────────────── */}
      <div style={{
        background: `linear-gradient(135deg, ${T.heat} 0%, #8B1A00 50%, ${T.coolDark} 100%)`,
        padding: "20px 16px 16px", color: "#fff"
      }}>
        <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, opacity: 0.7, marginBottom: 4 }}>
          NATURAL COOLING PLAN · BUNDELKHAND EDITION
        </div>
        <h1 style={{ fontSize: 22, fontWeight: 900, margin: "0 0 12px", lineHeight: 1.2 }}>
          47°C Bahar →<br/>25°C Andar
        </h1>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{
            background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "8px 14px",
            textAlign: "center", flex: 1
          }}>
            <div style={{ fontSize: 26, fontWeight: 900, color: "#FF8A65", letterSpacing: -1 }}>47–50°C</div>
            <div style={{ fontSize: 10, opacity: 0.75 }}>Outside Peak</div>
          </div>
          <div style={{ fontSize: 22, opacity: 0.6 }}>→</div>
          <div style={{
            background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "8px 14px",
            textAlign: "center", flex: 1
          }}>
            <div style={{ fontSize: 26, fontWeight: 900, color: "#81D4FA", letterSpacing: -1 }}>24–28°C</div>
            <div style={{ fontSize: 10, opacity: 0.75 }}>Indoors Target</div>
          </div>
        </div>
        <div style={{ marginTop: 10, fontSize: 11.5, opacity: 0.8, lineHeight: 1.5 }}>
          Zero major electricity · 100% natural methods · Tailored for MP/Bundelkhand dry heat
        </div>
      </div>

      {/* ── QUICK FACTS ────────────────────────────── */}
      <div style={{ background: T.coolDark, padding: "12px 14px" }}>
        <div style={{ fontSize: 10, fontWeight: 800, color: "#81D4FA", letterSpacing: 1.5, marginBottom: 8 }}>
          KEY FACTS TO KNOW
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 10px" }}>
          {QUICK.map((q, i) => (
            <div key={i} style={{ display: "flex", gap: 5, alignItems: "flex-start" }}>
              <span style={{ fontSize: 14, flexShrink: 0 }}>{q.i}</span>
              <div>
                <div style={{ fontSize: 10, fontWeight: 800, color: "#B3E5FC" }}>{q.t}</div>
                <div style={{ fontSize: 10, color: "#90CAF9", lineHeight: 1.4 }}>{q.b}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ── PHASE TABS ─────────────────────────────── */}
      <div style={{
        position: "sticky", top: 0, zIndex: 20,
        background: T.sand, borderBottom: `2px solid ${T.sandDark}`,
        display: "flex", overflowX: "auto", padding: "8px 8px 0", gap: 6
      }}>
        {PHASES.map(p => (
          <button key={p.id} onClick={() => { setTab(p.id); setExpanded(null); }} style={{
            flexShrink: 0, padding: "6px 12px 8px", borderRadius: "10px 10px 0 0",
            border: "none", cursor: "pointer", fontSize: 11, fontWeight: 800,
            letterSpacing: 0.3, transition: "all 0.15s",
            background: tab === p.id ? p.accent : "transparent",
            color: tab === p.id ? "#fff" : T.muted,
            boxShadow: tab === p.id ? `0 -2px 8px ${p.accent}40` : "none"
          }}>
            {p.emoji} {p.label}
          </button>
        ))}
      </div>

      {/* ── PHASE HEADER ───────────────────────────── */}
      <div style={{
        background: phase.accent + "18", borderBottom: `1px solid ${phase.accent}30`,
        padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center"
      }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: phase.accent }}>{phase.emoji} {phase.label}</div>
          <div style={{ fontSize: 11, color: T.muted }}>{phase.eng}</div>
        </div>
        <div style={{
          background: T.amber + "22", border: `1px solid ${T.amber}40`,
          borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 700, color: T.amber
        }}>
          {phase.range}
        </div>
      </div>

      {/* ── METHOD CARDS ───────────────────────────── */}
      <div style={{ padding: "12px 12px 4px" }}>
        {phase.methods.map((m, idx) => (
          <MethodCard key={idx} m={m} idx={idx} expanded={expanded} onToggle={toggle} accent={phase.accent} />
        ))}
      </div>

      {/* ── COOLING MATH ───────────────────────────── */}
      <div style={{ padding: "4px 12px 12px" }}>
        <button onClick={() => setShowMath(!showMath)} style={{
          width: "100%", background: `linear-gradient(135deg, ${T.heat}22, ${T.cool}22)`,
          border: `1.5px solid ${T.cool}50`, borderRadius: 14, padding: "12px 16px",
          cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center"
        }}>
          <div>
            <div style={{ fontWeight: 800, fontSize: 14, color: T.coolDark }}>🎯 Cooling Math: How It Adds Up</div>
            <div style={{ fontSize: 11, color: T.muted }}>See how methods stack to reach 25°C</div>
          </div>
          <span style={{ color: T.muted }}>{showMath ? "▲" : "▼"}</span>
        </button>

        {showMath && (
          <div style={{
            background: T.card, border: `1px solid ${T.sandDark}`,
            borderRadius: "0 0 14px 14px", borderTop: "none", padding: "4px 0"
          }}>
            {mathRows.map((r, i) => {
              const isFirst = i === 0;
              const isLast = i === mathRows.length - 1;
              const pct = Math.max(5, Math.min(100, ((r.after - 20) / (50 - 20)) * 100));
              return (
                <div key={i} style={{
                  padding: "8px 14px",
                  borderBottom: isLast ? "none" : `1px solid ${T.sandDark}`,
                  background: isLast ? r.col + "14" : "transparent"
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: isLast || isFirst ? 800 : 600, color: T.text }}>
                        {isFirst ? "🌡️ " : isLast ? "❄️ " : "→ "}{r.step}
                      </div>
                      <div style={{ fontSize: 10, color: T.muted }}>{r.note}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0, paddingLeft: 8 }}>
                      {r.delta !== undefined && (
                        <div style={{ fontSize: 12, fontWeight: 700, color: T.green }}>−{Math.abs(r.delta)}°C</div>
                      )}
                      <div style={{
                        fontSize: isLast ? 18 : 13, fontWeight: 900, color: r.col,
                        fontFamily: "monospace"
                      }}>{r.after}°C</div>
                    </div>
                  </div>
                  <div style={{ height: 5, background: T.sandDark, borderRadius: 3, overflow: "hidden" }}>
                    <div style={{
                      height: "100%", width: `${pct}%`, borderRadius: 3,
                      background: `linear-gradient(90deg, ${r.col}, ${r.col}88)`,
                      transition: "width 0.5s"
                    }} />
                  </div>
                </div>
              );
            })}
            <div style={{ padding: "10px 14px", background: T.cool + "10" }}>
              <p style={{ margin: 0, fontSize: 11.5, color: T.coolDark, lineHeight: 1.6 }}>
                <strong>Note:</strong> Effects overlap partially — combined real-world result is <strong>24–30°C indoors</strong> during peak 47–50°C heat when all methods are applied together in a dry climate like Bundelkhand.
              </p>
            </div>
          </div>
        )}
      </div>

      {/* ── PRIORITY ACTION LIST ────────────────────── */}
      <div style={{ padding: "0 12px 12px" }}>
        <div style={{ background: T.card, border: `1px solid ${T.sandDark}`, borderRadius: 14, padding: 14 }}>
          <div style={{ fontWeight: 800, fontSize: 13, color: T.text, marginBottom: 10 }}>
            🚀 Priority Action Order (Start Today)
          </div>
          {[
            ["This week, ₹0–500", "Night purging + window direction strategy. Free cooling, start tonight."],
            ["This week, ₹500–1500", "Khus tatty on all windows + wet gunny bags on roof. Biggest immediate effect."],
            ["This week, ₹500–2000", "White chuna on roof. Single biggest passive cooling step."],
            ["Month 1, ₹5,000–15,000", "Roof thermocol insulation. Game changer for indoor comfort."],
            ["3 Months, ₹20,000+", "Earth air tunnel if you have land. Permanent 12–18°C cooling, zero running cost."],
            ["Long term", "Plant bamboo on west side now — it gives shade in 1–2 years. Start today."],
          ].map(([time, desc], i) => (
            <div key={i} style={{
              display: "flex", gap: 10, marginBottom: i < 5 ? 8 : 0,
              paddingBottom: i < 5 ? 8 : 0, borderBottom: i < 5 ? `1px solid ${T.sandDark}` : "none"
            }}>
              <div style={{
                background: T.heat, color: "#fff", borderRadius: "50%",
                width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center",
                fontWeight: 900, fontSize: 11, flexShrink: 0, marginTop: 1
              }}>{i + 1}</div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: T.heat }}>{time}</div>
                <div style={{ fontSize: 12, color: T.text, lineHeight: 1.5 }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ── FOOTER NOTE ────────────────────────────── */}
      <div style={{ padding: "0 12px 24px" }}>
        <div style={{
          background: T.green + "15", border: `1px solid ${T.green}30`,
          borderRadius: 12, padding: 12
        }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: T.green, marginBottom: 4 }}>
            📍 Your Bundelkhand Advantage
          </div>
          <p style={{ margin: 0, fontSize: 11.5, color: "#1A3A1A", lineHeight: 1.6 }}>
            Bundelkhand's <strong>hot dry climate</strong> is actually ideal for natural cooling — evaporative methods work 2× better than in humid cities.
            You have <strong>land for earth air tunnels</strong>,
            <strong> local Vindhyan sandstone</strong> for thick walls,
            <strong> bamboo</strong> for shading, and
            <strong> clay soil</strong> for mud plaster — all for free or near zero cost.
            Traditional Bundela architecture already solved this problem centuries ago.
          </p>
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
